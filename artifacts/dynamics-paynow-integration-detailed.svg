  <text x="44" y="45" class="title">Dynamics PayNow Integration - SAP Sales Invoice, PayNow QR, UOB/SG Bank API</text>
  <text x="44" y="72" class="sub">Detailed project view: QR generation at cash counter, PayNow payment, realtime bank notification, and SAP transaction confirmation.</text>
