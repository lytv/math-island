<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1900 980" width="1900" height="980">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title{font-size:28px;font-weight:750;fill:#111827}.sub{font-size:14px;fill:#667085}.h1{font-size:20px;font-weight:750;fill:#111827}.h2{font-size:15px;fill:#667085}.msg{font-size:18px;font-weight:750;fill:#111827}.detail{font-size:15px;fill:#667085}.step{font-size:15px;font-weight:750;fill:#ffffff}
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="#243b5a"/></marker>
    <marker id="arrow-gray" markerWidth="11" markerHeight="8" refX="10" refY="4" orient="auto"><polygon points="0 0,11 4,0 8" fill="#6b7280"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/></filter>
  </defs>
  <rect width="1900" height="980" fill="#ffffff"/>
  <rect x="8" y="8" width="1884" height="964" rx="14" fill="#ffffff" stroke="#d0d5dd" stroke-width="1.6"/>
  <text x="40" y="48" class="title">SCSK PayNow Counter Sales Flowchart</text>
  <text x="40" y="76" class="sub">Sequence view for Phase 1: SAP invoice data, PayNow QR creation, customer payment, webhook, and SAP paid confirmation.</text>
  <rect x="20.0" y="105" width="320" height="82" rx="9" fill="#e5e7eb" stroke="#98a2b3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="180" y="139" text-anchor="middle" class="h1">SAP S/4HANA</text>
  <text x="180" y="167" text-anchor="middle" class="h2">actor · source of record</text>
  <line x1="180" y1="188" x2="180" y2="888" stroke="#98a2b3" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="400.0" y="105" width="320" height="82" rx="9" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="560" y="139" text-anchor="middle" class="h1">Counter UI</text>
  <text x="560" y="167" text-anchor="middle" class="h2">counter sales channel</text>
  <line x1="560" y1="188" x2="560" y2="888" stroke="#98a2b3" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="790.0" y="105" width="320" height="82" rx="9" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="950" y="139" text-anchor="middle" class="h1">Payment Middleware</text>
  <text x="950" y="167" text-anchor="middle" class="h2">.NET 8 · Azure App Service</text>
  <line x1="950" y1="188" x2="950" y2="888" stroke="#98a2b3" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="1175.0" y="105" width="320" height="82" rx="9" fill="#e9f5dd" stroke="#7fb24c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1335" y="139" text-anchor="middle" class="h1">PayNow - HitPay</text>
  <text x="1335" y="167" text-anchor="middle" class="h2">payment provider</text>
  <line x1="1335" y1="188" x2="1335" y2="888" stroke="#98a2b3" stroke-width="1.5" stroke-dasharray="5,5"/>
  <rect x="1550.0" y="105" width="320" height="82" rx="9" fill="#e5e7eb" stroke="#98a2b3" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1710" y="139" text-anchor="middle" class="h1">Customer</text>
  <text x="1710" y="167" text-anchor="middle" class="h2">banking app</text>
  <line x1="1710" y1="188" x2="1710" y2="888" stroke="#98a2b3" stroke-width="1.5" stroke-dasharray="5,5"/>
  <line x1="180" y1="240" x2="950" y2="240" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="208" cy="240" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="208" y="245" text-anchor="middle" class="step">1</text>
  <text x="565.0" y="218" text-anchor="middle" class="msg">QR invoice data</text>
  <text x="565.0" y="245" text-anchor="middle" class="detail">POST /api/payments { invoiceNo, amount, reference }</text>
  <line x1="950" y1="345" x2="1335" y2="345" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="978" cy="345" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="978" y="350" text-anchor="middle" class="step">2</text>
  <text x="1142.5" y="323" text-anchor="middle" class="msg">create transaction</text>
  <text x="1142.5" y="350" text-anchor="middle" class="detail">amount, reference, expiry</text>
  <line x1="1335" y1="455" x2="950" y2="455" stroke="#6b7280" stroke-width="2.5" marker-end="url(#arrow-gray)" stroke-dasharray="8,6"/>
  <circle cx="1307" cy="455" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="1307" y="460" text-anchor="middle" class="step">3</text>
  <text x="1142.5" y="433" text-anchor="middle" class="msg">QR / checkout response</text>
  <text x="1142.5" y="460" text-anchor="middle" class="detail">QR payload + provider payment id</text>
  <line x1="950" y1="565" x2="560" y2="565" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="922" cy="565" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="922" y="570" text-anchor="middle" class="step">4</text>
  <text x="755.0" y="543" text-anchor="middle" class="msg">show QR</text>
  <text x="755.0" y="570" text-anchor="middle" class="detail">Counter UI displays QR + Pending status</text>
  <line x1="1710" y1="680" x2="1335" y2="680" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="1682" cy="680" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="1682" y="685" text-anchor="middle" class="step">5</text>
  <text x="1522.5" y="658" text-anchor="middle" class="msg">scan and pay (PayNow)</text>
  <text x="1522.5" y="685" text-anchor="middle" class="detail">customer pays exact amount</text>
  <line x1="1335" y1="785" x2="950" y2="785" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="1307" cy="785" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="1307" y="790" text-anchor="middle" class="step">6</text>
  <text x="1142.5" y="763" text-anchor="middle" class="msg">signed webhook</text>
  <text x="1142.5" y="790" text-anchor="middle" class="detail">validate HMAC, dedupe -&gt; Paid</text>
  <line x1="950" y1="875" x2="180" y2="875" stroke="#243b5a" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <circle cx="922" cy="875" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="922" y="880" text-anchor="middle" class="step">7</text>
  <text x="565.0" y="853" text-anchor="middle" class="msg">paid confirmation</text>
  <text x="565.0" y="880" text-anchor="middle" class="detail">update SAP invoice -&gt; Paid</text>
  <line x1="950" y1="930" x2="560" y2="930" stroke="#6b7280" stroke-width="2.5" marker-end="url(#arrow-gray)" stroke-dasharray="8,6"/>
  <circle cx="922" cy="930" r="17" fill="#243b5a" stroke="#ffffff" stroke-width="2"/>
  <text x="922" y="935" text-anchor="middle" class="step">8</text>
  <text x="755.0" y="908" text-anchor="middle" class="msg">status = Paid</text>
  <text x="755.0" y="935" text-anchor="middle" class="detail">cashier sees paid confirmation</text>
  <rect x="40" y="952" width="1820" height="20" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="58" y="967" class="detail">Scope note: Counter UI displays QR/status only. Full POS build, SAP FI/AR clearing, refunds, and Field Power/mobile flow should be scoped separately.</text>
</svg>