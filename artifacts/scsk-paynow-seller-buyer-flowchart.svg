  <text x="56" y="158" class="sm">Seller above / Buyer below</text>
  <rect x="300" y="110" width="240" height="790" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.3" stroke-dasharray="7,5"/>
  <text x="316" y="138" class="lane">COUNTER SALES</text>
  <text x="316" y="158" class="sm">Counter UI / QR display</text>
  <rect x="570" y="110" width="230" height="790" rx="10" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.3" stroke-dasharray="7,5"/>
