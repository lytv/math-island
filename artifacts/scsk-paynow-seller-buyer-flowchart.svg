  <rect x="46" y="918" width="1558" height="44" rx="8" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="64" y="944" class="sm">Note: Flow numbering follows the new reference image. Seller/Buyer remain in the first column; backend flow starts from SAP invoice data.</text>
